name: Unzip and Build
permissions:
  contents: write
on: push
jobs:
  unzip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Unzip project
        run: |
          unzip -o bykeno-final.zip
          rm bykeno-final.zip
      - name: Commit files
        run: |
          git config user.name "bykeno"
          git config user.email "bykeno@users.noreply.github.com"
          git add .
          git commit -m "extract bykeno project" || echo "no changes"
          git push
