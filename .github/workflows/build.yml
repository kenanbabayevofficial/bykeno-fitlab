name: Build bykeno APK
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Unzip fixed project
        run: |
          rm -rf app
          if [ -f "bykeno-final-fixed.zip" ]; then unzip -o bykeno-final-fixed.zip; fi
          if [ -f "bykeno-final.zip" ]; then unzip -o bykeno-final.zip; fi
          ls -la app/src/main/java/com/bykeno/fitlab/

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.5

      - name: Build Debug APK
        run: gradle assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: bykeno-google-fit-final
          path: app/build/outputs/apk/debug/app-debug.apk
